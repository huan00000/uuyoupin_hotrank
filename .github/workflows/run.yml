name: Run Script
on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须开启写权限
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'  # 👈 这里改成 latest 即可
      - name: Install dependencies
        run: pip install requests
      - name: Pre-create empty file (防漏文件)
        run: touch 数据.json  # 强制创建空文件，保证 git 能识别
      - name: Run get_data
        env:
          # 👇 所有敏感数据从 GitHub Secrets 读取
          UU_DEVICE_TOKEN: ${{ secrets.UU_DEVICE_TOKEN }}
          UU_SIGNATURE: ${{ secrets.UU_SIGNATURE }}
          UU_REQUESTTAG: ${{ secrets.UU_REQUESTTAG }}
          UU_UK: ${{ secrets.UU_UK }}
          UU_AUTH: ${{ secrets.UU_AUTH }}
          UU_DEVICE_UK: ${{ secrets.UU_DEVICE_UK }}
          UU_SESSION_ID: ${{ secrets.UU_SESSION_ID }}
          UU_ACW_TC: ${{ secrets.UU_ACW_TC }}
        run: python get_data.py

      - name: Commit and push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add 数据.json
          git commit -m "更新数据 $(date '+%Y-%m-%d %H:%M:%S')"
          git push
